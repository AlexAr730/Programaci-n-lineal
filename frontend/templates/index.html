<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Fuente -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/main.css') }}"
    />

    <title>Programación Lineal</title>
  </head>

  <body>
    <div class="wrapper">
      <div class="container">

        <!-- HEADER -->
        <div class="text-center mb-5">
          <h1 class="main-title">Programación Lineal</h1>
          <p class="subtitle">
            Resuelve problemas de optimización utilizando
            Método Gráfico y Simplex Big M.
          </p>
        </div>

        <!-- GRID PRINCIPAL -->
        <div class="row g-4">

          <!-- COLUMNA IZQUIERDA -->
          <div class="col-lg-5">

            <!-- MÉTODO -->
            <div class="bg-light p-4 h-100">
              <label class="form-label">
                Método de resolución
              </label>

              <div class="dropdown w-100">
                <button
                  class="btn dropdown-toggle w-100"
                  type="button"
                  id="methodDropdown"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Seleccionar método
                </button>

                <ul class="dropdown-menu w-100">
                  <li>
                    <a
                      class="dropdown-item"
                      href="#"
                      onclick="selectMethod('Graphical Method')"
                    >
                      Método Gráfico
                    </a>
                  </li>

                  <li>
                    <a
                      class="dropdown-item"
                      href="#"
                      onclick="selectMethod('Simplex M Method')"
                    >
                      Método Simplex Big M
                    </a>
                  </li>
                </ul>
              </div>

              <input type="hidden" id="method" value="method" />

              <!-- TIPO -->
              <div class="mt-5">
                <label class="form-label">
                  Tipo de problema
                </label>

                <div class="d-flex flex-column gap-3 mt-3">

                  <div class="form-check custom-radio">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="problemType"
                      id="checkMax"
                      value="max"
                    />

                    <label class="form-check-label" for="checkMax">
                      Maximización
                    </label>
                  </div>

                  <div class="form-check custom-radio">
                    <input
                      class="form-check-input"
                      type="radio"
                      name="problemType"
                      id="checkMin"
                      value="min"
                    />

                    <label class="form-check-label" for="checkMin">
                      Minimización
                    </label>
                  </div>

                </div>
              </div>

            </div>
          </div>

          <!-- COLUMNA DERECHA -->
          <div class="col-lg-7">

            <!-- FUNCIÓN OBJETIVO -->
            <div class="bg-light p-4 mb-4">
              <label for="objectiveFunction" class="form-label">
                Función objetivo
              </label>

              <input
                type="text"
                class="form-control"
                id="objectiveFunction"
                placeholder="Ejemplo: 3x + 2y"
              />

              <small class="text-muted d-block mt-2">
                Ingresa la función objetivo que deseas maximizar o minimizar.
              </small>
            </div>

            <!-- RESTRICCIONES -->
            <div class="bg-light p-4">

              <div class="d-flex justify-content-between align-items-center mb-3">
                <label class="form-label mb-0">
                  Restricciones
                </label>

                <button
                  type="button"
                  class="btn btn-sm btn-add"
                  onclick="addConstraint()"
                >
                  + Agregar
                </button>
              </div>

              <div id="constraintsContainer">

                <!-- RESTRICCIÓN -->
                <div class="constraint-group">

                  <div class="d-flex align-items-center gap-2">

                    <input
                      type="text"
                      class="form-control constraint-input"
                      placeholder="Ejemplo: (1,1,4,'<=')"
                      data-bs-toggle="tooltip"
                      data-bs-placement="top"
                      title="Formato: (coefX, coefY, '<=', resultado)"
                    />

                    <button
                      type="button"
                      class="btn btn-remove"
                      onclick="removeConstraint(this)"
                    >
                      ×
                    </button>

                  </div>

                </div>

              </div>

              <small class="text-muted d-block mt-3">
                Puedes agregar múltiples restricciones para el problema.
              </small>

            </div>

          </div>
        </div>

        <!-- BOTÓN -->
        <div class="text-center mt-5">

          <button
            type="submit"
            class="btn btn-submit"
            onclick="submitForm()"
          >
            Resolver Problema
          </button>

        </div>

      </div>
    </div>

    <!-- JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

    <script src="{{ url_for('static', filename='scripts/main.js') }}"></script>
  </body>
</html>
